# gh-pages 브랜치에 정적 사이트 배포 (Settings에서 branch: gh-pages 선택)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy static site
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: true
          exclude: |
            .github/**
            .gitignore
            *.pdf
            *.md
